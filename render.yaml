services:
  # Servicio Backend (Node.js)
  - type: web
    name: proyecto-inicial-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: "3000"
      - key: FRONTEND_URL
        value: "https://proyecto-inicial-frontend.onrender.com"
      # --- TiDB Cloud: Rellenar con las credenciales de tu clúster ---
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_PORT
        value: "4000"
      # SSL requerido por TiDB Cloud para conexiones públicas
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true

  # Servicio Frontend (Angular - Static Site)
  - type: static
    name: proyecto-inicial-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build:prod
    publishPath: dist/proyecto_inicial/browser
    # Regla de enrutamiento necesaria para Single Page Applications (SPA) como Angular
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
