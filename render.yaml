services:
  # Servicio Backend (Node.js)
  - type: web
    name: proyecto-inicial-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: "3000"
      - key: FRONTEND_URL
        value: "https://proyecto-inicial-frontend.onrender.com"
      # --- TiDB Cloud: Rellenar con las credenciales de tu clúster ---
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_PORT
        value: "4000"
      # SSL requerido por TiDB Cloud para conexiones públicas
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true


