<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h2>Panel Administrativo</h2>
      <p>Inicia sesión para gestionar tareas y configuraciones</p>
    </div>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input id="username" type="text" formControlName="username" placeholder="admin" autocomplete="off" />
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input id="password" type="password" formControlName="password" placeholder="••••••••" />
      </div>
      
      @if (errorMessage) {
        <div class="error-message">{{ errorMessage }}</div>
      }

      <button type="submit" [disabled]="loginForm.invalid || isLoading" class="btn-submit">
        @if (isLoading) {
          <span class="spinner"></span> Validando...
        } @else {
          Ingresar al Sistema
        }
      </button>
    </form>
    <div class="back-link">
      <a routerLink="/">Volver a inicio</a>
    </div>
  </div>
</div>
